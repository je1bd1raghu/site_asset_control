<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>SCADA View</title>
    <script src="libs/cytoscape.min.js"></script>
    <script src="scada-core.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f4f8; }

        .header {
            background: #1a252f;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            flex-wrap: wrap;
        }
        .header h1 { font-size: 0.95rem; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 6px;
            color: white;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 10px;
            text-decoration: none;
            letter-spacing: 0.3px;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .back-link:hover { background: rgba(255,255,255,0.22); }

        /* Compass rose */
        #compass {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 64px;
            height: 64px;
            z-index: 10;
            pointer-events: none;
            opacity: 0.82;
            display: none;
        }

        /* GPS layout mode badge */
        #layout-badge {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26,37,47,0.78);
            color: #7fdbca;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.6px;
            padding: 3px 10px;
            border-radius: 10px;
            z-index: 10;
            pointer-events: none;
            display: none;
        }
        #zone-select {
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid #4a6278;
            background: #2c3e50;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            min-width: 220px;
        }
        #zone-select option { background: #2c3e50; }

        #sync-status {
            margin-left: auto;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 12px;
            background: #34495e;
            transition: background 0.4s;
            flex-shrink: 0;
        }

        #cy-container {
            position: relative;
            width: 100vw;
            height: calc(100vh - 50px);
        }
        #cy { width: 100%; height: 100%; display: block; }

        /* Loading overlay */
        #loading {
            position: absolute;
            inset: 0;
            background: rgba(240,244,248,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #2c3e50;
            z-index: 20;
        }
        #loading.hidden { display: none; }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 0.8rem;
            z-index: 10;
        }
        .legend h4 { margin-bottom: 8px; color: #333; font-size: 0.85rem; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }

        /* Shape swatches — mirror Cytoscape native shapes exactly */
        .lg-diamond {
            width: 14px; height: 14px; flex-shrink: 0;
            transform: rotate(45deg);
            border-radius: 2px;
        }
        .lg-circle {
            width: 14px; height: 14px; flex-shrink: 0;
            border-radius: 50%;
        }
        .lg-roundrect {
            width: 18px; height: 13px; flex-shrink: 0;
            border-radius: 3px;
        }
        .lg-pipe {
            width: 26px; height: 4px; flex-shrink: 0;
            border-radius: 2px;
        }
        .lg-fault {
            width: 26px; height: 4px; flex-shrink: 0;
            border-radius: 2px;
        }

        /* Fault blink legend pulse */
        @keyframes legendFaultBlink {
            0%, 100% { background: #e74c3c; }
            50%       { background: #ff8c00; }
        }
        .lg-fault { animation: legendFaultBlink 1s infinite; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-link">← Asset Control</a>
    <a href="graph-analyzer.html" class="back-link" title="Open Graph Analyzer">⬡ Graph Analyzer</a>
    <h1>🌊 SCADA View</h1>
    <select id="zone-select"><option>Loading zones...</option></select>
    <div id="sync-status">Initializing...</div>
</div>

<div id="cy-container">
    <div id="cy"></div>
    <div id="loading">Loading zone...</div>

    <!-- Compass rose — shown only when GPS layout is active -->
    <svg id="compass" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" fill="rgba(26,37,47,0.72)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <!-- N arrow (red) -->
        <polygon points="32,6 28,32 32,28 36,32" fill="#e74c3c"/>
        <!-- S arrow (white) -->
        <polygon points="32,58 36,32 32,36 28,32" fill="rgba(255,255,255,0.7)"/>
        <!-- E / W ticks -->
        <line x1="56" y1="32" x2="50" y2="32" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="8"  y1="32" x2="14" y2="32" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <!-- Cardinal labels -->
        <text x="32" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="sans-serif">N</text>
        <text x="32" y="55" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="8" font-family="sans-serif">S</text>
        <text x="54" y="36" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="8" font-family="sans-serif">E</text>
        <text x="10" y="36" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="8" font-family="sans-serif">W</text>
    </svg>

    <!-- Shown when GPS polar layout is active -->
    <div id="layout-badge">📡 GPS DIRECTION LAYOUT</div>

    <div class="legend">
        <h4>Legend</h4>

        <div class="legend-item">
            <div class="lg-diamond" style="background:#2ecc71; border: 2px solid #27ae60;"></div>
            Valve OPEN
        </div>
        <div class="legend-item">
            <div class="lg-diamond" style="background:#e74c3c; border: 2px solid #c0392b;"></div>
            Valve CLOSED
        </div>

        <div class="legend-item">
            <div class="lg-circle" style="background:#8e44ad; border: 3px solid #2ecc71;"></div>
            Pump RUNNING
        </div>
        <div class="legend-item">
            <div class="lg-circle" style="background:#95a5a6; border: 2px solid #7f8c8d;"></div>
            Pump STOPPED
        </div>

        <div class="legend-item">
            <div class="lg-roundrect" style="background:#3498db; border: 2px solid #2980b9;"></div>
            Zone ACTIVE
        </div>
        <div class="legend-item">
            <div class="lg-roundrect" style="background:#bdc3c7; border: 2px solid #95a5a6;"></div>
            Zone INACTIVE
        </div>

        <div class="legend-item">
            <div class="lg-pipe" style="background:#2ecc71;"></div>
            Active Flow
        </div>
        <div class="legend-item">
            <div class="lg-fault"></div>
            Fault
        </div>
    </div>
</div>

<script>
    // ─── CONFIG ───────────────────────────────────────────────────────────────
    const GITHUB_USERNAME     = 'je1bd1raghu';
    const GIST_ID             = 'b92c304c7c56c5a76916600d35b55d67';
    const REFRESH_INTERVAL_MS = 20000;
    // ─────────────────────────────────────────────────────────────────────────

    let cy            = null;
    let refreshTimer  = null;
    let currentZone   = null;
    let stopAnims     = null;   // teardown handle returned by startAnimations()

    // ─── GPS POLAR PROJECTION ─────────────────────────────────────────────────
    // Converts node lat/lng into canvas positions using bearing + normalised
    // distance from the diagram's "origin" node (first pump, or first node).
    //
    // Rules:
    //   - Bearing from origin → each node gives the angle (N=up, E=right).
    //   - Distance is normalised 0–1 across the set, then mapped to maxRadius.
    //   - Origin node itself is placed at the canvas centre.
    //   - Nodes without lat/lng keep their existing manual position unchanged.
    //
    // Returns true if projection was applied (≥2 nodes had GPS coords).

    function applyGpsLayout(nodes, canvasW, canvasH) {
        const PADDING   = 80;   // px margin from canvas edge
        const maxRadius = Math.min(canvasW, canvasH) / 2 - PADDING;
        const cx        = canvasW / 2;
        const cy        = canvasH / 2;
        const DEG2RAD   = Math.PI / 180;

        // Collect nodes that carry GPS data
        const gpsNodes = nodes.filter(n => {
            const d = n.data || n;
            return typeof d.lat === 'number' && typeof d.lng === 'number';
        });

        if (gpsNodes.length < 2) return false;   // not enough data — skip

        // Pick origin: first pump node with GPS, else first GPS node
        const origin = gpsNodes.find(n => (n.data || n).type === 'pump') || gpsNodes[0];
        const oLat   = (origin.data || origin).lat;
        const oLng   = (origin.data || origin).lng;

        // Latitude correction factor for longitude distances at this latitude
        const cosLat = Math.cos(oLat * DEG2RAD);

        // Compute polar coords (bearing, raw distance) for every GPS node
        const polars = gpsNodes.map(n => {
            const d    = n.data || n;
            const dLat = d.lat - oLat;
            const dLng = (d.lng - oLng) * cosLat;   // corrected for latitude
            const dist = Math.sqrt(dLat * dLat + dLng * dLng);
            // atan2 bearing: 0 = north, clockwise positive
            const bearing = Math.atan2(dLng, dLat);  // radians
            return { node: n, dist, bearing };
        });

        // Normalise distances to 0–1  (origin stays at 0)
        const maxDist = Math.max(...polars.map(p => p.dist));

        polars.forEach(({ node, dist, bearing }) => {
            const r  = maxDist > 0 ? (dist / maxDist) * maxRadius : 0;
            const px = cx + r * Math.sin(bearing);   // sin for x (east)
            const py = cy - r * Math.cos(bearing);   // -cos for y (north=up)

            // Write back into the node's position field
            if (node.position) {
                node.position.x = px;
                node.position.y = py;
            } else {
                node.position = { x: px, y: py };
            }
        });

        // ── Minimum-distance enforcement ──────────────────────────────────────
        // Single pass per outer iteration: compute midpoint between any pair
        // closer than MIN_DIST and place both exactly MIN_DIST/2 from it along
        // their original bearing.  Wrap in up to 4 outer passes to resolve
        // cascades (A–B fix pushing A into C) without convergence complexity.
        const MIN_DIST = 80;   // pixels — matches label/icon clearance

        for (let pass = 0; pass < 4; pass++) {
            let anyViolation = false;
            for (let i = 0; i < gpsNodes.length; i++) {
                for (let j = i + 1; j < gpsNodes.length; j++) {
                    const a  = gpsNodes[i].position;
                    const b  = gpsNodes[j].position;
                    if (!a || !b) continue;

                    const dx   = b.x - a.x;
                    const dy   = b.y - a.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < MIN_DIST && dist > 0.01) {
                        anyViolation = true;
                        // Unit vector along a→b
                        const nx = dx / dist;
                        const ny = dy / dist;
                        // Midpoint
                        const mx = (a.x + b.x) / 2;
                        const my = (a.y + b.y) / 2;
                        // Place both exactly MIN_DIST/2 from midpoint
                        a.x = mx - nx * MIN_DIST / 2;
                        a.y = my - ny * MIN_DIST / 2;
                        b.x = mx + nx * MIN_DIST / 2;
                        b.y = my + ny * MIN_DIST / 2;
                    }
                }
            }
            if (!anyViolation) break;   // all pairs already clear — done early
        }

        return true;
    }

    // ─── LOAD MANIFEST → POPULATE DROPDOWN ───────────────────────────────────
    async function loadManifest() {
        const select = document.getElementById('zone-select');
        try {
            const res = await fetch('manifest.json?t=' + Date.now());
            if (!res.ok) throw new Error('manifest.json not found');
            const zones = await res.json();

            select.innerHTML = '<option value="">— Select a zone —</option>';
            zones.forEach(z => {
                const opt = document.createElement('option');
                opt.value       = JSON.stringify(z);   // store full zone object
                opt.textContent = z.name;
                select.appendChild(opt);
            });

            // Auto-load first zone
            if (zones.length > 0) {
                select.selectedIndex = 1;
                loadZone(zones[0]);
            }
        } catch (err) {
            select.innerHTML = '<option>Error loading manifest</option>';
            console.error(err);
        }
    }

    // ─── LOAD ZONE DIAGRAM ────────────────────────────────────────────────────
    async function loadZone(zone) {
        if (currentZone && currentZone.id === zone.id) return;
        currentZone = zone;

        // Stop existing refresh + animation loops
        if (refreshTimer) clearInterval(refreshTimer);
        if (stopAnims)    stopAnims();

        showLoading(true);
        setStatus('Loading ' + zone.name + '...', '#34495e');

        try {
            const res = await fetch(`zones/${zone.id}.json?t=` + Date.now());
            if (!res.ok) throw new Error(`zones/${zone.id}.json not found`);
            const diagram = await res.json();

            // Attempt GPS polar projection before handing to Cytoscape
            const container  = document.getElementById('cy');
            const gpsApplied = applyGpsLayout(
                diagram.nodes,
                container.offsetWidth  || window.innerWidth,
                container.offsetHeight || window.innerHeight - 50
            );

            // Show/hide GPS indicators
            document.getElementById('compass').style.display      = gpsApplied ? 'block' : 'none';
            document.getElementById('layout-badge').style.display = gpsApplied ? 'block' : 'none';

            initCytoscape(diagram);

            // ── Start all visual animations ────────────────────────────────
            stopAnims = startAnimations(cy);

            showLoading(false);

            // Start live refresh for this zone
            await refreshStatus(zone);
            refreshTimer = setInterval(() => refreshStatus(zone), REFRESH_INTERVAL_MS);

        } catch (err) {
            showLoading(false);
            setStatus('⚠ ' + err.message, '#c0392b');
            console.error(err);
        }
    }

    // ─── INIT / REINIT CYTOSCAPE ──────────────────────────────────────────────
    function initCytoscape(diagram) {
        if (cy) cy.destroy();   // tear down previous instance

        cy = cytoscape({
            container: document.getElementById('cy'),
            style: CY_STYLE,
            elements: {
                nodes: diagram.nodes,
                edges: diagram.edges
            },
            layout: { name: 'preset' },
            userZoomingEnabled: true,
            userPanningEnabled: true
        });

        cy.fit(undefined, 40);
		if (cy.zoom() < 0.9) {
		    cy.zoom({ level: 0.9, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } });
		}			//This is useful when GPS layout spreads nodes far apart (large geographic area) — it prevents the auto-fit from shrinking everything down to match the full extent.

        cy.on('tap', 'node', function(evt) {
            const n = evt.target;
            console.log(`[TAP] id=${n.id()} type=${n.data('type')} state=${n.data('state')} lat=${n.data('lat')} lng=${n.data('lng')}`);
        });
    }

    // ─── FETCH LIVE STATUS FROM GIST ─────────────────────────────────────────
    async function refreshStatus(zone) {
        if (!cy || !zone) return;
        setStatus('Syncing...', '#34495e');
        try {
            const url = `https://gist.githubusercontent.com/${GITHUB_USERNAME}/${GIST_ID}/raw/${zone.gistFile}?t=${Date.now()}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const data = await res.json();
            if (data.error) throw new Error(data.error);

            const updated = applyStatus(cy, data);
            setStatus(`✓ Synced ${new Date().toLocaleTimeString()} (${updated} elements)`, '#27ae60');
        } catch (err) {
            setStatus('⚠ ' + err.message, '#c0392b');
            console.error('Refresh error:', err);
        }
    }

    // ─── UI HELPERS ───────────────────────────────────────────────────────────
    function setStatus(msg, bg) {
        const el = document.getElementById('sync-status');
        el.innerText = msg;
        el.style.background = bg;
    }

    function showLoading(visible) {
        document.getElementById('loading').classList.toggle('hidden', !visible);
    }

    // ─── ZONE SELECT HANDLER ──────────────────────────────────────────────────
    document.getElementById('zone-select').addEventListener('change', function() {
        if (!this.value) return;
        loadZone(JSON.parse(this.value));
    });

    // ─── BOOT ─────────────────────────────────────────────────────────────────
    loadManifest();
</script>
</body>
</html>
