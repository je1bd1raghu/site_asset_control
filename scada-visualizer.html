<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+Bengali:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>SCADA View</title>
    <script src="libs/cytoscape.min.js"></script>
  <script src="libs/fp.min.js"></script>
  <script src="libs/papaparse.min.js"></script>
    <script src="scada-core.js"></script>
    <script src="gps-layout.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', 'Noto Sans Bengali', sans-serif; background: #f0f4f8; }

        .header {
            background: #1a252f;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            flex-wrap: wrap;
        }
        .header h1 { font-size: 0.95rem; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 6px;
            color: white;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 4px 10px;
            text-decoration: none;
            letter-spacing: 0.3px;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .back-link:hover { background: rgba(255,255,255,0.22); }

        /* Compass rose */
        #compass {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 64px;
            height: 64px;
            z-index: 10;
            pointer-events: none;
            opacity: 0.82;
            display: none;
        }

        /* GPS layout mode badge */
        #layout-badge {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26,37,47,0.78);
            color: #7fdbca;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.6px;
            padding: 3px 10px;
            border-radius: 10px;
            z-index: 10;
            pointer-events: none;
            display: none;
        }
        #zone-select {
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid #4a6278;
            background: #2c3e50;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            min-width: 220px;
        }
        #zone-select option { background: #2c3e50; }

        #sync-status {
            margin-left: auto;
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 12px;
            background: #34495e;
            transition: background 0.4s;
            flex-shrink: 0;
        }

        #cy-container {
            position: relative;
            width: 100vw;
            height: calc(100vh - 50px);
        }
        #cy { width: 100%; height: 100%; display: block; }

        /* Node size controls (+/-) — matches Graph Analyzer style */
        .node-size-controls {
            position: absolute;
            bottom: 20px;
            right: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            z-index: 15;
        }
        .node-size-controls .nsc-label {
            font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.85);
            font-family: 'Nunito', sans-serif; letter-spacing: 0.4px;
            text-transform: uppercase; user-select: none; text-align: center;
            background: rgba(26,37,47,0.82); border-radius: 4px;
            padding: 1px 5px; line-height: 1.4;
        }
        .nsc-btn {
            width: 32px; height: 32px; border-radius: 8px;
            border: 2px solid rgba(127,219,202,0.5);
            background: rgba(26,37,47,0.82); color: #7fdbca;
            font-size: 20px; font-weight: 800; line-height: 1;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.35);
            transition: background 0.15s, border-color 0.15s;
            padding: 0;
        }
        .nsc-btn:hover { background: rgba(127,219,202,0.18); border-color: #7fdbca; }
        .nsc-btn:active { background: #7fdbca; color: #1a252f; }
        .nsc-btn:focus-visible { outline: 3px solid #7fdbca; outline-offset: 2px; }

        /* Loading overlay */
        #loading {
            position: absolute;
            inset: 0;
            background: rgba(240,244,248,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #2c3e50;
            z-index: 20;
        }
        #loading.hidden { display: none; }

        /* Legend - collapsible on mobile */
        .legend {
            position: absolute;
            bottom: 20px;
            left: 12px;
            background: white;
            border-radius: 8px;
            padding: 10px 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
            font-size: 0.78rem;
            z-index: 15;
            max-width: calc(100vw - 100px);
        }
        .legend-toggle {
            display: none;
            background: none; border: none; cursor: pointer;
            font-size: 0.75rem; font-weight: 800;
            color: #2c3e50; padding: 0; line-height: 1;
        }
        .legend h4 {
            margin-bottom: 8px; color: #333; font-size: 0.83rem;
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
        }
        .legend-body { display: block; }
        .legend.collapsed .legend-body { display: none; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }

        /* Mobile breakpoint (<=480px) */
        @media (max-width: 480px) {
            .header { padding: 8px 10px; gap: 8px; }
            .header h1 { font-size: 0.8rem; }
            #zone-select { min-width: 0; width: 100%; font-size: 0.8rem; }
            #sync-status { font-size: 0.7rem; padding: 3px 8px; }
            #cy-container { height: calc(100vh - 44px); }

            /* Controls: move to top-right, horizontal row */
            .node-size-controls {
                bottom: auto; top: 10px; right: 10px;
                flex-direction: row; gap: 6px;
            }
            .node-size-controls .nsc-label { display: none; }
            .nsc-btn { width: 36px; height: 36px; font-size: 22px; }

            /* Legend: bottom-left, collapsible */
            .legend {
                bottom: 10px; left: 8px;
                padding: 8px 10px;
                max-width: calc(100vw - 24px);
                font-size: 0.72rem;
            }
            .legend-toggle { display: inline; }

            /* Compass: smaller, top-left */
            #compass { width: 44px; height: 44px; top: 10px; left: 10px; right: auto; }
            #layout-badge { top: 56px; font-size: 0.62rem; }

            /* Node panel: scrollable */
            #node-info-panel { max-height: 45vh; overflow-y: auto; }
            .nip-fields { gap: 5px 12px; }
            .nip-comment-block { min-width: 0; width: 100%; }
        }

        /* Tablet breakpoint (481-767px) */
        @media (min-width: 481px) and (max-width: 767px) {
            .header { padding: 8px 14px; gap: 10px; }
            #zone-select { min-width: 160px; font-size: 0.82rem; }
            .node-size-controls { bottom: 16px; right: 12px; }
            .legend { bottom: 16px; left: 10px; font-size: 0.75rem; padding: 9px 12px; }
            .legend-toggle { display: inline; }
        }

        /* Shape swatches — mirror Cytoscape native shapes exactly */
        .lg-diamond {
            width: 14px; height: 14px; flex-shrink: 0;
            transform: rotate(45deg);
            border-radius: 2px;
        }
        .lg-circle {
            width: 14px; height: 14px; flex-shrink: 0;
            border-radius: 50%;
        }
        .lg-roundrect {
            width: 18px; height: 13px; flex-shrink: 0;
            border-radius: 3px;
        }
        .lg-pipe {
            width: 26px; height: 4px; flex-shrink: 0;
            border-radius: 2px;
        }
        .lg-fault {
            width: 26px; height: 4px; flex-shrink: 0;
            border-radius: 2px;
        }

        /* Fault blink legend pulse */
        @keyframes legendFaultBlink {
            0%, 100% { background: #e74c3c; }
            50%       { background: #ff8c00; }
        }
        .lg-fault { animation: legendFaultBlink 1s infinite; }

        /* ── Node info panel ─────────────────────────────────────────────── */
        #node-info-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #1a252f;
            color: #ecf0f1;
            border-top: 2px solid #2c3e50;
            padding: 10px 20px;
            z-index: 30;
            display: none;
            font-family: 'Nunito', 'Noto Sans Bengali', sans-serif;
            font-size: 0.82rem;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.35);
        }
        #node-info-panel.visible { display: flex; }
        .nip-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .nip-title {
            font-size: 0.88rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #7fdbca;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nip-close {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 0.75rem;
            flex-shrink: 0;
        }
        .nip-close:hover { background: rgba(255,255,255,0.1); color: white; }
        .nip-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 20px;
        }
        .nip-field {
            display: flex;
            flex-direction: column;
            min-width: 80px;
        }
        .nip-key {
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 1px;
        }
        .nip-val {
            font-size: 0.82rem;
            color: #ecf0f1;
            word-break: break-word;
        }
        .nip-val.empty { color: rgba(255,255,255,0.25); font-style: italic; }
        .nip-val.state-on  { color: #2ecc71; font-weight: 700; }
        .nip-val.state-off { color: #e74c3c; font-weight: 700; }
        .nip-comment-block {
            flex: 1;
            min-width: 200px;
        }
        .nip-comment-block .nip-val {
            background: rgba(241,196,15,0.1);
            border-left: 3px solid #f1c40f;
            padding: 4px 8px;
            border-radius: 0 4px 4px 0;
            color: #f9e79f;
            line-height: 1.4;
        }
        .nip-inner {
            flex: 1;
        }

        /* ── Fault report action bar ───────────────────────────────────── */
        .nip-fault-bar {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 8px 0 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 8px;
        }
        .nip-fault-person {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .nip-fault-person label {
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
        }
        .nip-fault-person select {
            background: #2c3e50;
            color: #ecf0f1;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            padding: 4px 8px;
            font-family: 'Nunito', 'Noto Sans Bengali', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            flex: 1;
            min-width: 0;
            outline: none;
        }
        .nip-fault-person select:focus { border-color: #e74c3c; }
        .nip-fault-btns {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-fault-report {
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 12px;
            font-family: 'Nunito', 'Noto Sans Bengali', sans-serif;
            font-size: 0.78rem;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-fault-report:hover { background: #e74c3c; }
        .btn-fault-report:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-fault-clear {
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 12px;
            font-family: 'Nunito', 'Noto Sans Bengali', sans-serif;
            font-size: 0.78rem;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-fault-clear:hover { background: #2ecc71; }
        .btn-fault-clear:disabled { opacity: 0.4; cursor: not-allowed; }
        .nip-fault-status {
            font-size: 0.72rem;
            font-weight: 600;
            color: rgba(255,255,255,0.45);
            min-height: 16px;
        }
        .nip-fault-status.ok   { color: #2ecc71; }
        .nip-fault-status.err  { color: #e74c3c; }
        .nip-fault-status.warn { color: #f39c12; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-link">← Asset Control</a>
    <a href="graph-analyzer.html" class="back-link" title="Open Graphical Network Analyzer">⬡ Graphical Network Analyzer</a>
    <h1>🌊 SCADA View</h1>
    <select id="zone-select"><option>Loading zones...</option></select>
    <div id="sync-status">Initializing...</div>
</div>

<div id="cy-container">
    <div id="cy"></div>
    <div id="loading">Loading zone...</div>

    <!-- Compass rose — shown only when GPS layout is active -->
    <svg id="compass" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" fill="rgba(26,37,47,0.72)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <!-- N arrow (red) -->
        <polygon points="32,6 28,32 32,28 36,32" fill="#e74c3c"/>
        <!-- S arrow (white) -->
        <polygon points="32,58 36,32 32,36 28,32" fill="rgba(255,255,255,0.7)"/>
        <!-- E / W ticks -->
        <line x1="56" y1="32" x2="50" y2="32" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="8"  y1="32" x2="14" y2="32" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <!-- Cardinal labels -->
        <text x="32" y="20" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="'Nunito', 'Noto Sans Bengali', sans-serif">N</text>
        <text x="32" y="55" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="8" font-family="'Nunito', 'Noto Sans Bengali', sans-serif">S</text>
        <text x="54" y="36" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="8" font-family="'Nunito', 'Noto Sans Bengali', sans-serif">E</text>
        <text x="10" y="36" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="8" font-family="'Nunito', 'Noto Sans Bengali', sans-serif">W</text>
    </svg>

    <!-- Shown when GPS polar layout is active -->
    <div id="layout-badge">📡 GPS DIRECTIONAL LAYOUT</div>

    <!-- Node size controls -->
    <div class="node-size-controls" aria-label="Node size controls">
        <span class="nsc-label">Node<br>Size</span>
        <button class="nsc-btn" onclick="adjustNodeSize(1)" title="Increase node &amp; label size" aria-label="Increase node size">+</button>
        <button class="nsc-btn" onclick="adjustNodeSize(-1)" title="Decrease node &amp; label size" aria-label="Decrease node size">−</button>
    </div>

    <div class="legend" id="legend">
        <h4>Legend <button class="legend-toggle" onclick="toggleLegend()" id="legend-toggle-btn" aria-label="Toggle legend">▾</button></h4>
        <div class="legend-body">

        <div class="legend-item">
            <div class="lg-diamond" style="background:#2ecc71; border: 2px solid #27ae60;"></div>
            Valve OPEN
        </div>
        <div class="legend-item">
            <div class="lg-diamond" style="background:#e74c3c; border: 2px solid #c0392b;"></div>
            Valve CLOSED
        </div>

        <div class="legend-item">
            <div class="lg-circle" style="background:#8e44ad; border: 3px solid #2ecc71;"></div>
            Pump RUNNING
        </div>
        <div class="legend-item">
            <div class="lg-circle" style="background:#95a5a6; border: 2px solid #7f8c8d;"></div>
            Pump STOPPED
        </div>

        <div class="legend-item">
            <div class="lg-roundrect" style="background:#3498db; border: 2px solid #2980b9;"></div>
            Zone ACTIVE
        </div>
        <div class="legend-item">
            <div class="lg-roundrect" style="background:#bdc3c7; border: 2px solid #95a5a6;"></div>
            Zone INACTIVE
        </div>

        <div class="legend-item">
            <div class="lg-pipe" style="background:#2ecc71;"></div>
            Active Flow
        </div>
        <div class="legend-item">
            <div class="lg-fault"></div>
            Fault
        </div>
        </div><!-- /legend-body -->
    </div>
    <!-- Node info panel — shown on node click -->
    <div id="node-info-panel" role="complementary" aria-label="Node information">
        <div class="nip-inner">
            <div class="nip-header">
                <span class="nip-title" id="nip-title">Node Info</span>
                <button class="nip-close" onclick="closeNodePanel()" aria-label="Close info panel">✕ Close</button>
            </div>
            <div class="nip-fields" id="nip-fields"></div>
            <!-- Fault report bar — shown only for edges -->
            <div class="nip-fault-bar" id="nip-fault-bar" style="display:none">
                <div class="nip-fault-person">
                    <label for="fault-person-select">Your Name</label>
                    <select id="fault-person-select"><option value="">— select —</option></select>
                </div>
                <div class="nip-fault-btns">
                    <button class="btn-fault-report" id="btn-fault-report" onclick="submitFault('FAULT')" disabled>⚠ Report Fault</button>
                    <button class="btn-fault-clear"  id="btn-fault-clear"  onclick="submitFault('FAULT_CLEAR')" disabled>✓ Clear Fault</button>
                    <span class="nip-fault-status" id="nip-fault-status"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Legend collapse toggle
    function toggleLegend() {
        const leg = document.getElementById('legend');
        const btn = document.getElementById('legend-toggle-btn');
        const collapsed = leg.classList.toggle('collapsed');
        btn.textContent = collapsed ? '▸' : '▾';  // right / down arrow
        btn.setAttribute('aria-expanded', String(!collapsed));
    }
    // Auto-collapse legend on small screens
    if (window.innerWidth <= 767) {
        const leg = document.getElementById('legend');
        const btn = document.getElementById('legend-toggle-btn');
        if (leg && btn) { leg.classList.add('collapsed'); btn.textContent = '▸'; }
    }

    // ─── CONFIG ───────────────────────────────────────────────────────────────
    const GITHUB_USERNAME     = 'je1bd1raghu';
    const GIST_ID             = 'b92c304c7c56c5a76916600d35b55d67';
    const REFRESH_INTERVAL_MS = 20000;

    // ─── WORKER / RECORDS ────────────────────────────────────────────────────
    const WORKER       = 'https://scada-visualizer.je1-bd1-raghu.workers.dev';
    const RECORDS_FILE = 'records.csv';
    const CONFIG_FILE  = 'config.json';
    // ─────────────────────────────────────────────────────────────────────────

    let persons    = [];   // loaded from config.json
    let deviceId   = '';   // FingerprintJS visitor ID
    let faultState = {};   // edgeId → 'FAULT' | 'FAULT_CLEAR' | undefined
    let _currentFaultEdgeId = null;   // edge currently shown in info panel

    let cy            = null;
    let refreshTimer  = null;
    let currentZone   = null;
    let stopAnims     = null;   // teardown handle returned by startAnimations()

    // ─── NODE SIZE CONTROLS ───────────────────────────────────────────────────
    // Typed-node baselines at step 0 (mirror scada-core.js static sizes)
    const NSC_DOT_BASE  = 4;    // untyped junction dot size at step 0
    const NSC_DOT_STEP  = 1;    // dot px change per step (smaller than typed nodes)
    const NSC_VALVE_SZ  = 44;   // valve baseline px
    const NSC_PUMP_SZ   = 48;   // pump baseline px
    const NSC_ZONE_W    = 56;   // zone width baseline px
    const NSC_ZONE_H    = 44;   // zone height baseline px
    const NSC_BASE_FONT = 11;   // typed label font px at step 0
    const NSC_STEP_PX   = 6;    // px change per step for typed nodes
    const NSC_STEP_FONT = 1.5;  // font px change per step
    let _nodeSizeStep   = 0;

    function adjustNodeSize(delta) {
        _nodeSizeStep = Math.max(-4, Math.min(5, _nodeSizeStep + delta));
        _applyNodeSizeStyle();
    }
    function _applyNodeSizeStyle() {
        if (!cy) return;
        const s        = _nodeSizeStep;
        const dSz      = s * NSC_STEP_PX;   // signed delta for typed nodes
        const rawFont  = NSC_BASE_FONT + s * NSC_STEP_FONT;
        const font     = (s <= -4 ? '0' : Math.max(6, rawFont)) + 'px';
        // Each typed node type scales from its own baseline
        const valveSz  = Math.max(20, NSC_VALVE_SZ + dSz);
        const pumpSz   = Math.max(22, NSC_PUMP_SZ  + dSz);
        const zoneW    = Math.max(24, NSC_ZONE_W   + dSz);
        const zoneH    = Math.max(20, NSC_ZONE_H   + dSz);
        // Edge + arrowhead proportional to typed-node midpoint
        const edgeW      = Math.min(10, Math.max(1, 4 + s * 0.8));
        const arrowScale = Math.min(2.5, Math.max(0.4, 1.0 + s * 0.15));
        // Untyped dot scales with steps; min 2 so it stays visible
        const dotSz      = Math.max(2, NSC_DOT_BASE + s * NSC_DOT_STEP);
        cy.style()
          // Untyped dot scales and can reach 0 (hidden)
          .selector('node')
          .style({ 'width': dotSz, 'height': dotSz, 'font-size': '0px', 'min-zoomed-font-size': 0 })
          // Typed nodes each scale from their own baselines
          .selector('node[type]')
          .style({ 'font-size': font, 'min-zoomed-font-size': 6 })
          .selector('node[type="valve"]')
          .style({ 'width': valveSz, 'height': valveSz })
          .selector('node[type="pump"]')
          .style({ 'width': pumpSz, 'height': pumpSz })
          .selector('node[type="zone"]')
          .style({ 'width': zoneW, 'height': zoneH })
          .selector('edge')
          .style({ 'width': edgeW, 'arrow-scale': arrowScale })
          .update();
    }
    function _resetNodeSizeStep() { _nodeSizeStep = 0; }
    // ─────────────────────────────────────────────────────────────────────────

    // ─── LOAD MANIFEST → POPULATE DROPDOWN ───────────────────────────────────
    async function loadManifest() {
        const select = document.getElementById('zone-select');
        try {
            const res = await fetch('manifest.json?t=' + Date.now());
            if (!res.ok) throw new Error('manifest.json not found');
            const zones = await res.json();

            select.innerHTML = '<option value="">— Select a zone —</option>';
            zones.forEach(z => {
                const opt = document.createElement('option');
                opt.value       = JSON.stringify(z);   // store full zone object
                opt.textContent = z.name;
                select.appendChild(opt);
            });

            // Wire up zone switching
            select.addEventListener('change', () => {
                const val = select.value;
                if (!val) return;
                const zone = JSON.parse(val);
                currentZone = null;   // clear guard so same zone can reload
                loadZone(zone);
            });

            // Restore the last-viewed zone (or fall back to first)
            if (zones.length > 0) {
                const savedId = localStorage.getItem('scada_last_zone');
                const savedIdx = savedId ? zones.findIndex(z => z.id === savedId) : -1;
                const zoneToLoad = savedIdx >= 0 ? zones[savedIdx] : zones[0];
                select.selectedIndex = (savedIdx >= 0 ? savedIdx : 0) + 1; // +1 for placeholder option
                loadZone(zoneToLoad);
            }
        } catch (err) {
            select.innerHTML = '<option>Error loading manifest</option>';
            console.error(err);
        }
    }

    // ─── LOAD ZONE DIAGRAM ────────────────────────────────────────────────────
    async function loadZone(zone) {
        if (currentZone && currentZone.id === zone.id) return;
        currentZone = zone;
        localStorage.setItem('scada_last_zone', zone.id);

        // Stop existing refresh + animation loops
        if (refreshTimer) clearInterval(refreshTimer);
        if (stopAnims)    stopAnims();

        showLoading(true);
        setStatus('Loading ' + zone.name + '...', '#34495e');

        try {
            const res = await fetch(`zones/${zone.id}.json?t=` + Date.now());
            if (!res.ok) throw new Error(`zones/${zone.id}.json not found`);
            const diagram = await res.json();

            // Attempt GPS polar projection before handing to Cytoscape
            const container  = document.getElementById('cy');
            const gpsApplied = applyGpsLayout(
                diagram.nodes,
                container.offsetWidth  || window.innerWidth,
                container.offsetHeight || window.innerHeight - 50
            );

            // Show/hide GPS indicators
            document.getElementById('compass').style.display      = gpsApplied ? 'block' : 'none';
            document.getElementById('layout-badge').style.display = gpsApplied ? 'block' : 'none';

            // ── Compatibility shim: zone.json files exported by older versions
            // used crypto.randomUUID() as node id, while edges still referenced
            // the original string ids (e.g. "R-1"). Detect and remap so Cytoscape
            // doesn't crash with "nonexistent source" errors.
            repairDiagramIds(diagram);

            initCytoscape(diagram);

            // ── Start all visual animations ────────────────────────────────
            stopAnims = startAnimations(cy);

            showLoading(false);

            // Start live refresh for this zone
            await refreshStatus(zone);
            refreshTimer = setInterval(() => refreshStatus(zone), REFRESH_INTERVAL_MS);

            // Load fault state from records.csv and overlay on graph
            await loadFaultState();
            applyFaultOverlay();

        } catch (err) {
            showLoading(false);
            setStatus('⚠ ' + err.message, '#c0392b');
            console.error(err);
        }
    }

    // ─── COMPATIBILITY SHIM ───────────────────────────────────────────────────
    // zone.json files exported by older graph-analyzer versions stored a
    // crypto.randomUUID() as the node id, while edge source/target still held
    // the original topology string (e.g. "R-1"). Detect this mismatch and remap
    // node ids so that Cytoscape can resolve edge endpoints without crashing.
    function repairDiagramIds(diagram) {
        if (!diagram.nodes || !diagram.edges || diagram.edges.length === 0) return;

        // Build set of all node ids currently in the diagram
        const nodeIdSet = new Set(diagram.nodes.map(n => (n.data || n).id));

        // Collect all unique endpoint ids referenced by edges
        const edgeEndpoints = new Set();
        diagram.edges.forEach(e => {
            const d = e.data || e;
            if (d.source) edgeEndpoints.add(d.source);
            if (d.target) edgeEndpoints.add(d.target);
        });

        // If all edge endpoints resolve to known node ids, nothing to fix
        const missingEndpoints = [...edgeEndpoints].filter(id => !nodeIdSet.has(id));
        if (missingEndpoints.length === 0) return;

        // Mismatch detected: node ids are UUIDs, edge endpoints are topology strings.
        // Attempt to remap by matching on node label (which preserves the original id).
        const labelToNode = new Map();
        diagram.nodes.forEach(n => {
            const d = n.data || n;
            // The label was set from the original node id in older exports
            if (d.label) labelToNode.set(d.label, n);
        });

        let remapped = 0;
        missingEndpoints.forEach(epId => {
            const matchedNode = labelToNode.get(epId);
            if (matchedNode) {
                const d = matchedNode.data || matchedNode;
                d.id = epId;   // overwrite UUID with topology id
                remapped++;
            }
        });

        if (remapped > 0) {
            console.warn(`[repairDiagramIds] Remapped ${remapped} node id(s) from UUID to topology id. Re-export zone.json from the graph analyzer to silence this.`);
        }
    }

    // ─── INIT / REINIT CYTOSCAPE ──────────────────────────────────────────────
    function initCytoscape(diagram) {
        if (cy) cy.destroy();   // tear down previous instance

        cy = cytoscape({
            container: document.getElementById('cy'),
            style: CY_STYLE,
            elements: {
                nodes: diagram.nodes,
                edges: diagram.edges
            },
            layout: { name: 'preset' },
            userZoomingEnabled: true,
            userPanningEnabled: true,
            minZoom: 0.15,
            maxZoom: 8,

        });

        cy.center();   // centre graph at true size without fitting to canvas

        cy.on('tap', 'node', function(evt) {
            const n = evt.target;
            showNodePanel(n);
        });

        // Tap on background dismisses the panel
        cy.on('tap', function(evt) {
            if (evt.target === cy) closeNodePanel();
        });

        bindEdgeTap();
    }

    // ─── NODE INFO PANEL ─────────────────────────────────────────────────────
    function showNodePanel(n) {
        const panel  = document.getElementById('node-info-panel');
        const title  = document.getElementById('nip-title');
        const fields = document.getElementById('nip-fields');

        const id      = n.id()               || '';
        const type    = n.data('type')        || '';
        const label   = n.data('label')       || '';
        const state   = n.data('state')       || '';
        const lat     = n.data('lat')         != null ? n.data('lat') : '';
        const lng     = n.data('lng')         != null ? n.data('lng') : '';
        const comment = n.data('comment')     || '';

        title.textContent = label || id || 'Node Info';

        const stateClass = state === 'ON' ? 'state-on' : state === 'OFF' ? 'state-off' : '';
        const fmtCoord   = v => v !== '' ? parseFloat(v).toFixed(6) : '';

        function field(key, val, extraClass) {
            const isEmpty = val === '' || val == null;
            return `<div class="nip-field">
                <span class="nip-key">${key}</span>
                <span class="nip-val${isEmpty ? ' empty' : ''}${extraClass ? ' ' + extraClass : ''}">${isEmpty ? '—' : val}</span>
            </div>`;
        }

        let html = field('ID', id)
                 + field('Type', type ? type.charAt(0).toUpperCase() + type.slice(1) : '')
                 + field('Label', label)
                 + field('State', state, stateClass)
                 + field('Lat', fmtCoord(lat))
                 + field('Long', fmtCoord(lng));

        if (comment) {
            html += `<div class="nip-field nip-comment-block">
                <span class="nip-key">Comment</span>
                <span class="nip-val">${comment}</span>
            </div>`;
        }

        fields.innerHTML = html;
        document.getElementById('nip-fault-bar').style.display = 'none';
        _currentFaultEdgeId = null;
        panel.classList.add('visible');
    }

    function closeNodePanel() {
        document.getElementById('node-info-panel').classList.remove('visible');
    }
    // ─────────────────────────────────────────────────────────────────────────

    // ─── FETCH LIVE STATUS FROM GIST ─────────────────────────────────────────
    async function refreshStatus(zone) {
        if (!cy || !zone) return;
        setStatus('Syncing...', '#34495e');
        try {
            const url = `https://gist.githubusercontent.com/${GITHUB_USERNAME}/${GIST_ID}/raw/${zone.gistFile}?t=${Date.now()}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const data = await res.json();
            if (data.error) throw new Error(data.error);

            const updated = applyStatus(cy, data);

            // Re-apply fault overlay after every sync — applyStatus + propagateFlow
            // can overwrite edge flow values set by fault reports
            applyFaultOverlay();

            setStatus(`✓ Synced ${new Date().toLocaleTimeString()} (${updated} elements)`, '#27ae60');
        } catch (err) {
            setStatus('⚠ ' + err.message, '#c0392b');
            console.error('Refresh error:', err);
        }
    }

    // ─── UI HELPERS ───────────────────────────────────────────────────────────
    function setStatus(msg, bg) {
        const el = document.getElementById('sync-status');
        el.innerText = msg;
        el.style.background = bg;
    }

    function showLoading(visible) {
        document.getElementById('loading').classList.toggle('hidden', !visible);
    }


    // ─── WORKER HELPERS ───────────────────────────────────────────────────────
    async function workerGet(endpoint) {
        const r = await fetch(`${WORKER}/${endpoint}`);
        if (!r.ok) throw new Error(`Worker ${endpoint} failed: HTTP ${r.status}`);
        const d = await r.json();
        if (d.error) throw new Error(d.error);
        return d.files;
    }
    async function workerPatch(fileMap) {
        const files = {};
        for (const [k, v] of Object.entries(fileMap))
            files[k] = { content: typeof v === 'string' ? v : JSON.stringify(v, null, 2) };
        const r = await fetch(`${WORKER}/output`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ files })
        });
        if (!r.ok) throw new Error(`Worker write failed: HTTP ${r.status}`);
        const d = await r.json();
        if (!d.ok) throw new Error(d.error || 'Gist write failed');
    }

    // ─── DEVICE ID ────────────────────────────────────────────────────────────
    async function getDeviceId() {
        try {
            const fp = await FingerprintJS.load();
            return (await fp.get()).visitorId;
        } catch { return 'unknown'; }
    }

    // ─── PERSONS CONFIG ───────────────────────────────────────────────────────
    async function loadPersonsConfig() {
        try {
            const files = await workerGet('config');
            persons = JSON.parse(files[CONFIG_FILE] || '{}').persons || [];
            persons.sort((a, b) => a.name.localeCompare(b.name));
            const sel = document.getElementById('fault-person-select');
            sel.innerHTML = '<option value="">— select —</option>'
                + persons.map(p => `<option value="${esc(p.id)}">${esc(p.name)}${p.designation ? ' — ' + p.designation : ''}</option>`).join('');
            sel.addEventListener('change', onFaultPersonChange);
        } catch(e) {
            console.warn('Config load failed:', e.message);
        }
    }

    // ─── FAULT STATE FROM RECORDS ─────────────────────────────────────────────
    // Reads records.csv and derives the latest fault state per edge.
    async function loadFaultState() {
        try {
            const files = await workerGet('output');
            const rows  = csvParseFault(files[RECORDS_FILE] || '');
            faultState  = {};
            // Walk rows in order; last write per edge wins
            rows.forEach(r => {
                if ((r.action === 'FAULT' || r.action === 'FAULT_CLEAR') && r.assetId)
                    faultState[r.assetId] = r.action;
            });
        } catch(e) {
            console.warn('Fault state load failed:', e.message);
        }
    }

    // Apply faultState onto the current cy instance
    function applyFaultOverlay() {
        if (!cy) return;
        Object.entries(faultState).forEach(([edgeId, action]) => {
            const el = cy.getElementById(edgeId);
            if (!el.length) return;
            if (action === 'FAULT')
                el.data('flow', 'fault');
            else if (action === 'FAULT_CLEAR' && el.data('flow') === 'fault')
                el.data('flow', '');
        });
    }

    function csvParseFault(text) {
        if (!text?.trim()) return [];
        return Papa.parse(text.trim(), { header: true, skipEmptyLines: true }).data;
    }

    const FAULT_CSV_COLS = ['sn','personId','personName','zone','assetId','assetName',
                            'action','timestamp','date','time','lat','lng','distance','deviceId'];
    function pad2(n) { return n < 10 ? '0'+n : ''+n; }
    function todayStrFault() {
        const d = new Date();
        return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    }
    function timeStrFault(d) {
        return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
    }
    function esc(s) { return String(s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

    // ─── EDGE TAP → FAULT PANEL ───────────────────────────────────────────────
    // Called from initCytoscape after cy is ready
    function bindEdgeTap() {
        cy.on('tap', 'edge', function(evt) {
            showEdgeFaultPanel(evt.target);
        });
    }

    let _geoPos = null;
    function ensureGeoWatch() {
        if (_geoPos !== null || !navigator.geolocation) return;
        _geoPos = 'pending';
        navigator.geolocation.watchPosition(
            pos => { _geoPos = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy }; },
            ()  => { _geoPos = null; },
            { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
        );
    }

    function showEdgeFaultPanel(edge) {
        const panel  = document.getElementById('node-info-panel');
        const title  = document.getElementById('nip-title');
        const fields = document.getElementById('nip-fields');
        const bar    = document.getElementById('nip-fault-bar');

        _currentFaultEdgeId = edge.id();
        const src   = edge.data('source') || '';
        const tgt   = edge.data('target') || '';
        const flow  = edge.data('flow')   || '';
        const isFaulted = (faultState[edge.id()] === 'FAULT') || (flow === 'fault');

        title.textContent = `Pipe: ${src} → ${tgt}`;

        function field(key, val, cls) {
            const isEmpty = val === '' || val == null;
            return `<div class="nip-field">
                <span class="nip-key">${key}</span>
                <span class="nip-val${isEmpty?' empty':''}${cls?' '+cls:''}">${isEmpty?'—':val}</span>
            </div>`;
        }

        const flowLabel = flow === 'fault' ? '⚠ FAULT' : flow === 'active' ? '▶ Active' : flow === '' ? 'Idle' : flow;
        const flowCls   = flow === 'fault' ? 'state-off' : flow === 'active' ? 'state-on' : '';
        fields.innerHTML = field('Edge ID', edge.id())
                         + field('From', src)
                         + field('To', tgt)
                         + field('Flow', flowLabel, flowCls);

        // Fault bar
        bar.style.display = 'flex';
        bar.style.flexDirection = 'column';
        setFaultStatus('');
        onFaultPersonChange();   // update button states

        // Mark faulted state on Clear button
        document.getElementById('btn-fault-clear').style.display = isFaulted ? '' : 'none';
        document.getElementById('btn-fault-report').textContent  = isFaulted ? '⚠ Re-report Fault' : '⚠ Report Fault';

        panel.classList.add('visible');
        ensureGeoWatch();
    }

    function onFaultPersonChange() {
        const pid = document.getElementById('fault-person-select').value;
        const ok  = !!pid;
        document.getElementById('btn-fault-report').disabled = !ok;
        document.getElementById('btn-fault-clear').disabled  = !ok;
    }

    function setFaultStatus(msg, cls) {
        const el = document.getElementById('nip-fault-status');
        el.textContent = msg;
        el.className   = 'nip-fault-status' + (cls ? ' ' + cls : '');
    }

    async function submitFault(action) {
        const pid    = document.getElementById('fault-person-select').value;
        const person = persons.find(p => p.id === pid);
        if (!person) { setFaultStatus('Select your name first', 'err'); return; }
        if (!_currentFaultEdgeId) { setFaultStatus('No edge selected', 'err'); return; }

        // Location check — must have a GPS fix
        if (_geoPos === null || _geoPos === 'pending') {
            setFaultStatus('⏳ Waiting for GPS…', 'warn');
            ensureGeoWatch();
            return;
        }

        // Find the zone this edge belongs to (from currentZone)
        const zoneId = currentZone?.id || '';

        document.getElementById('btn-fault-report').disabled = true;
        document.getElementById('btn-fault-clear').disabled  = true;
        setFaultStatus('Saving…', '');

        try {
            const edge     = cy.getElementById(_currentFaultEdgeId);
            const edgeName = `${edge.data('source') || ''} → ${edge.data('target') || ''}`;
            const now      = new Date();

            const allFiles   = await workerGet('output');
            const allRecs    = csvParseFault(allFiles[RECORDS_FILE] || '');
            const rec = {
                sn:         allRecs.length + 1,
                deviceId:   deviceId,
                personId:   person.id,
                personName: person.name,
                assetId:    _currentFaultEdgeId,
                assetName:  edgeName,
                action:     action,
                timestamp:  now.toISOString(),
                date:       todayStrFault(),
                time:       timeStrFault(now),
                lat:        _geoPos.lat.toFixed(7),
                lng:        _geoPos.lng.toFixed(7),
                distance:   '',
                zone:       zoneId
            };
            allRecs.push(rec);
            await workerPatch({ [RECORDS_FILE]: Papa.unparse(allRecs, { columns: FAULT_CSV_COLS }) });

            // Update local fault state and overlay on graph
            faultState[_currentFaultEdgeId] = action;
            if (edge.length) {
                if (action === 'FAULT')
                    edge.data('flow', 'fault');
                else if (action === 'FAULT_CLEAR')
                    edge.data('flow', '');
            }

            const msg = action === 'FAULT' ? '⚠ Fault reported' : '✓ Fault cleared';
            setFaultStatus(msg, action === 'FAULT' ? 'err' : 'ok');

            // Refresh panel state
            document.getElementById('btn-fault-clear').style.display = action === 'FAULT' ? '' : 'none';
            document.getElementById('btn-fault-report').textContent  = action === 'FAULT' ? '⚠ Re-report Fault' : '⚠ Report Fault';
        } catch(e) {
            setFaultStatus('Error: ' + e.message, 'err');
        } finally {
            const pid2 = document.getElementById('fault-person-select').value;
            document.getElementById('btn-fault-report').disabled = !pid2;
            document.getElementById('btn-fault-clear').disabled  = !pid2;
        }
    }


    // ─── BOOT ─────────────────────────────────────────────────────────────────
    (async () => {
        deviceId = await getDeviceId();
        await loadPersonsConfig();
        loadManifest();
    })();
</script>
</body>
</html>
