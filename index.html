<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SCADA Asset Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+Bengali:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F4F6FA; --surface: #FFFFFF; --surface2: #F0F4FF;
    --primary: #2563EB; --primary-dark: #1D4ED8; --primary-light: #EFF6FF;
    --success: #16A34A; --success-light: #F0FDF4;
    --danger: #DC2626;  --danger-light: #FEF2F2;
    --warning: #D97706; --warning-light: #FFFBEB;
    --text: #1E293B; --text2: #475569; --text3: #94A3B8; --border: #E2E8F0;
    --radius: 16px; --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,.07); --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
  }
  body { font-family:'Nunito','Noto Sans Bengali',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased; }

  .header { background:var(--primary); color:#fff; padding:20px 20px 60px; text-align:center; position:relative; }
  .header h1 { font-size:22px; font-weight:800; letter-spacing:-.3px; }
  .header p  { font-size:12px; opacity:.8; margin-top:2px; }
  .header-right { position:absolute; right:16px; top:20px; }
  .scada-link { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,.15); border:1.5px solid rgba(255,255,255,.35); border-radius:10px; color:#fff; padding:6px 12px; font-size:12px; font-weight:800; font-family:'Nunito','Noto Sans Bengali',sans-serif; text-decoration:none; letter-spacing:.4px; transition:background .2s; white-space:nowrap; }
  .scada-link:hover { background:rgba(255,255,255,.28); border-color:rgba(255,255,255,.6); }

  .card-wrapper { padding:0 16px; margin-top:-40px; position:relative; z-index:10; }
  .card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow-lg); padding:24px; margin-bottom:16px; }

  .datetime-bar { display:flex; justify-content:space-between; align-items:center; background:var(--surface2); border-radius:var(--radius-sm); padding:14px 16px; margin-bottom:20px; }
  .dt-block { text-align:center; }
  .dt-label { font-size:11px; color:var(--text3); font-weight:700; text-transform:uppercase; letter-spacing:.8px; }
  .dt-val   { font-size:16px; font-weight:800; color:var(--text); margin-top:2px; }
  .dt-divider { width:1px; height:36px; background:var(--border); }

  .field-label { font-size:13px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.6px; margin-bottom:8px; }

  .combo-wrapper { position:relative; margin-bottom:20px; }
  .combo-input-row { display:flex; align-items:center; border:2px solid var(--border); border-radius:var(--radius-sm); background:#fff; transition:border-color .2s; }
  .combo-wrapper.open .combo-input-row, .combo-input-row:focus-within { border-color:var(--primary); }
  .combo-search-icon { padding:0 10px 0 14px; font-size:16px; flex-shrink:0; }
  .combo-input { flex:1; padding:15px 0; border:none; outline:none; font-family:'Nunito','Noto Sans Bengali',sans-serif; font-size:16px; font-weight:600; color:var(--text); background:transparent; }
  .combo-input::placeholder { color:var(--text3); font-weight:400; }
  .combo-clear { background:none; border:none; padding:0 14px; font-size:16px; color:var(--text3); cursor:pointer; flex-shrink:0; }
  .combo-clear:hover { color:var(--danger); }
  .combo-dropdown { position:absolute; top:calc(100% + 4px); left:0; right:0; background:#fff; border:2px solid var(--primary); border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); z-index:200; max-height:240px; overflow-y:auto; }
  .combo-item { padding:13px 16px; cursor:pointer; font-size:15px; font-weight:600; color:var(--text); border-bottom:1px solid var(--border); transition:background .12s; }
  .combo-item:last-child { border-bottom:none; }
  .combo-item:hover, .combo-item.active { background:var(--primary-light); color:var(--primary); }
  .combo-item mark { background:#FDE68A; color:var(--text); border-radius:3px; padding:0 2px; font-style:normal; }
  .combo-item .combo-desig { font-size:11px; font-weight:700; color:var(--text3); margin-top:2px; }
  .combo-empty { padding:18px 16px; text-align:center; color:var(--text3); font-size:14px; }

  .loc-status { display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:var(--radius-sm); border:2px solid transparent; transition:all .3s; }
  .loc-status.checking { background:var(--warning-light); border-color:#FDE68A; }
  .loc-status.verified { background:var(--success-light); border-color:#BBF7D0; }
  .loc-status.failed   { background:var(--danger-light);  border-color:#FECACA; }
  .loc-status.idle     { background:var(--surface2);      border-color:var(--border); }
  .loc-icon  { font-size:26px; flex-shrink:0; }
  .loc-title { font-size:15px; font-weight:700; }
  .loc-sub   { font-size:12px; font-weight:600; margin-top:2px; opacity:.75; }
  .loc-status.checking .loc-title { color:var(--warning); }
  .loc-status.verified .loc-title { color:var(--success); }
  .loc-status.failed   .loc-title { color:var(--danger); }
  .loc-status.idle     .loc-title { color:var(--text2); }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
  .loc-status.checking .loc-icon { animation:pulse 1.2s ease-in-out infinite; }

  .section-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--text3); margin-bottom:12px; }
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .btn-refresh { background:var(--surface2); border:2px solid var(--border); border-radius:8px; padding:4px 10px; font-size:12px; font-weight:700; color:var(--text2); cursor:pointer; font-family:'Nunito','Noto Sans Bengali',sans-serif; transition:background .15s; }
  .btn-refresh:hover { background:var(--primary-light); border-color:var(--primary); color:var(--primary); }

  .asset-card { border-radius:var(--radius-sm); border:2px solid var(--border); padding:16px; margin-bottom:12px; transition:border-color .25s, background .25s; }
  .asset-card:last-child { margin-bottom:0; }
  .asset-card.status-on  { border-color:#BBF7D0; background:var(--success-light); }
  .asset-card.status-off { border-color:var(--border); background:var(--surface); }
  .asset-card.loading    { opacity:.6; pointer-events:none; }
  .asset-top  { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .asset-name { font-size:16px; font-weight:800; color:var(--text); }
  .asset-type { font-size:12px; font-weight:600; color:var(--text3); margin-top:2px; }
  .asset-dist { font-size:12px; font-weight:600; color:var(--text3); margin-top:3px; }

  .toggle-wrap { display:flex; flex-direction:column; align-items:center; gap:5px; flex-shrink:0; }
  .toggle-switch { width:56px; height:30px; border-radius:15px; position:relative; cursor:pointer; border:none; padding:0; transition:background .25s; }
  .toggle-switch.on  { background:var(--success); }
  .toggle-switch.off { background:#CBD5E1; }
  .toggle-switch:disabled { opacity:.45; cursor:not-allowed; }
  .toggle-knob { position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; box-shadow:0 1px 5px rgba(0,0,0,.25); transition:transform .25s cubic-bezier(.34,1.4,.64,1); pointer-events:none; }
  .toggle-switch.on .toggle-knob { transform:translateX(26px); }
  .toggle-lbl { font-size:11px; font-weight:800; letter-spacing:.5px; }
  .toggle-switch.on  ~ .toggle-lbl { color:var(--success); }
  .toggle-switch.off ~ .toggle-lbl { color:var(--text3); }

  .asset-footer { margin-top:10px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:6px; }
  .asset-last { font-size:11px; color:var(--text3); font-weight:600; }
  .loc-badge  { font-size:11px; font-weight:700; padding:3px 9px; border-radius:6px; display:inline-flex; align-items:center; gap:4px; flex-shrink:0; }
  .loc-near { background:var(--success-light); color:var(--success); }
  .loc-far  { background:var(--danger-light);  color:var(--danger); }
  .loc-unk  { background:var(--surface2);      color:var(--text3); }
  .cooldown-badge { font-size:11px; font-weight:800; color:var(--warning); background:var(--warning-light); padding:3px 9px; border-radius:6px; display:inline-flex; align-items:center; gap:4px; }

  .record-item { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--border); }
  .record-item:last-child { border-bottom:none; }
  .record-avatar { width:44px; height:44px; border-radius:12px; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .rec-on  { background:var(--success-light); }
  .rec-off { background:var(--danger-light); }
  .rec-fault       { background:#fff3cd; }
  .rec-fault-clear { background:var(--success-light); }
  .chip-fault       { background:#fff3cd; color:var(--warning); }
  .chip-fault-clear { background:var(--success-light); color:var(--success); }

  /* ── Fault Edge Report section ── */
  .fault-search-wrap { position:relative; margin-bottom:14px; }
  .fault-search-input { width:100%; border:2px solid var(--border); border-radius:var(--radius-sm); padding:11px 14px 11px 40px; font-size:15px; font-family:'Nunito','Noto Sans Bengali',sans-serif; color:var(--text); outline:none; transition:border-color .2s; }
  .fault-search-input:focus { border-color:var(--primary); }
  .fault-search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:15px; pointer-events:none; }
  .fault-edge-list { max-height:220px; overflow-y:auto; border:2px solid var(--border); border-radius:var(--radius-sm); margin-bottom:14px; }
  .fault-edge-item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .12s; gap:10px; }
  .fault-edge-item:last-child { border-bottom:none; }
  .fault-edge-item:hover, .fault-edge-item.selected { background:var(--primary-light); }
  .fault-edge-item.selected { border-left:3px solid var(--primary); }
  .fei-id { font-size:13px; font-weight:800; color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .fei-route { font-size:11px; color:var(--text3); font-weight:600; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fei-zone { font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; background:var(--surface2); color:var(--text3); flex-shrink:0; }
  .fei-fault-badge { font-size:10px; font-weight:800; padding:2px 7px; border-radius:5px; background:#fff3cd; color:var(--warning); flex-shrink:0; }
  .fault-empty { text-align:center; padding:20px; color:var(--text3); font-size:13px; font-weight:700; }
  .fault-action-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-top:4px; }
  .fault-selected-label { font-size:12px; font-weight:700; color:var(--text2); padding:8px 12px; border-radius:var(--radius-sm); background:var(--surface2); border:2px solid var(--border); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .fault-selected-label.has-fault { background:#fff3cd; border-color:#fcd34d; color:var(--warning); }
  .btn-fault-rpt  { padding:10px 16px; background:#dc2626; color:#fff; border:none; border-radius:var(--radius-sm); font-family:'Nunito','Noto Sans Bengali',sans-serif; font-size:13px; font-weight:800; cursor:pointer; transition:background .2s; white-space:nowrap; }
  .btn-fault-rpt:hover { background:#b91c1c; }
  .btn-fault-rpt:disabled { opacity:.45; cursor:not-allowed; }
  .btn-fault-clr  { padding:10px 16px; background:var(--success); color:#fff; border:none; border-radius:var(--radius-sm); font-family:'Nunito','Noto Sans Bengali',sans-serif; font-size:13px; font-weight:800; cursor:pointer; transition:background .2s; white-space:nowrap; }
  .btn-fault-clr:hover { background:#15803d; }
  .btn-fault-clr:disabled { opacity:.45; cursor:not-allowed; }
  .fault-submit-status { font-size:12px; font-weight:600; color:var(--text3); min-height:18px; margin-top:6px; }
  .record-info { flex:1; min-width:0; }
  .record-name  { font-size:15px; font-weight:700; color:var(--text); }
  .record-asset { font-size:11px; color:var(--primary); font-weight:700; margin-top:1px; }
  .record-meta  { font-size:12px; color:var(--text3); font-weight:600; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .record-right { text-align:right; flex-shrink:0; }
  .time-chip { display:block; font-size:12px; font-weight:700; padding:3px 8px; border-radius:6px; margin-bottom:3px; white-space:nowrap; }
  .chip-on  { background:var(--success-light); color:var(--success); }
  .chip-off { background:var(--danger-light);  color:var(--danger); }

  .empty-state { text-align:center; padding:28px 0; color:var(--text3); font-weight:700; font-size:14px; }
  .dl-select { padding:10px 12px; border:2px solid var(--border); border-radius:var(--radius-sm); font-family:'Nunito','Noto Sans Bengali',sans-serif; font-size:14px; font-weight:600; color:var(--text); background:#fff; cursor:pointer; outline:none; transition:border-color .2s; }
  .dl-select:focus { border-color:var(--primary); }
  .btn-download { padding:10px 18px; background:var(--primary); color:#fff; border:none; border-radius:var(--radius-sm); font-family:'Nunito','Noto Sans Bengali',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:background .2s; white-space:nowrap; }
  .btn-download:hover { background:var(--primary-dark); }
  .btn-download:disabled { opacity:.5; cursor:not-allowed; }
  .empty-state .e-icon { font-size:36px; margin-bottom:8px; }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--text); color:#fff; padding:14px 24px; border-radius:50px; font-size:14px; font-weight:700; z-index:9999; transition:transform .35s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; max-width:88vw; text-align:center; }
  .toast.show    { transform:translateX(-50%) translateY(0); }
  .toast.success { background:var(--success); }
  .toast.error   { background:var(--danger); }
  .toast.warning { background:var(--warning); }

  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; gap:14px; transition:opacity .4s; }
  .loading-screen.hide { opacity:0; pointer-events:none; }
  .loading-screen .l-icon { font-size:52px; }
  .loading-screen .l-text { font-size:15px; font-weight:700; color:var(--text2); }
  .bar-track { width:160px; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .bar-fill  { height:100%; background:var(--primary); border-radius:3px; width:0%; transition:width .5s; }
</style>
<script src="libs/fp.min.js"></script>
<script src="libs/papaparse.min.js"></script>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="l-icon">🏭</div>
  <div class="l-text" id="loadingText">Starting up…</div>
  <div class="bar-track"><div class="bar-fill" id="loadingBar"></div></div>
</div>

<div class="toast" id="toast"></div>

<div class="header">
  <p id="headerDate">Loading…</p>
  <h1>SCADA Asset Control</h1>
  <div class="header-right">
    <a href="scada-visualizer.html" class="scada-link">🌊 SCADA View</a>
  </div>
</div>

<div class="card-wrapper">
  <div class="card">
    <div class="datetime-bar">
      <div class="dt-block"><div class="dt-label">Date</div><div class="dt-val" id="dispDate">—</div></div>
      <div class="dt-divider"></div>
      <div class="dt-block"><div class="dt-label">Time</div><div class="dt-val" id="dispTime">—</div></div>
      <div class="dt-divider"></div>
      <div class="dt-block"><div class="dt-label">Day</div><div class="dt-val" id="dispDay">—</div></div>
    </div>

    <div class="field-label">Select Your Name</div>
    <div class="combo-wrapper" id="comboWrapper">
      <div class="combo-input-row">
        <span class="combo-search-icon">&#128269;</span>
        <input type="text" id="personSearch" class="combo-input"
               placeholder="Type to search your name…" autocomplete="off"
               oninput="filterPersons()" onfocus="openDropdown()" />
        <button class="combo-clear" id="comboClear" onclick="clearPerson()" style="display:none">&#x2715;</button>
      </div>
      <div class="combo-dropdown" id="comboDropdown" style="display:none"></div>
    </div>
    <select id="personSelect" style="display:none"></select>

    <div class="loc-status idle" id="locStatus">
      <div class="loc-icon" id="locIcon">📍</div>
      <div>
        <div class="loc-title" id="locTitle">Location not checked</div>
        <div class="loc-sub"   id="locSub">Select your name to begin</div>
      </div>
    </div>
  </div>

  <div class="card" id="assetsCard" style="display:none">
    <div class="section-header">
      <div class="section-title" style="margin-bottom:0">Assigned Assets / Sites</div>
      <button class="btn-refresh" onclick="refreshAll()">↻ Refresh</button>
    </div>
    <div id="assetsList"></div>
  </div>

  <div class="card" id="faultCard">
    <div class="section-header">
      <div class="section-title" style="margin-bottom:0">⚠ Report Edge Fault</div>
    </div>

    <!-- Zone filter tabs -->
    <div id="faultZoneTabs" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>

    <!-- Search -->
    <div class="fault-search-wrap">
      <span class="fault-search-icon">🔍</span>
      <input type="search" id="faultSearch" class="fault-search-input"
             placeholder="Search pipe by ID, source or target…"
             oninput="filterFaultEdges()" autocomplete="off">
    </div>

    <!-- Edge list -->
    <div class="fault-edge-list" id="faultEdgeList">
      <div class="fault-empty">Loading edges…</div>
    </div>

    <!-- Selected edge + action row -->
    <div class="fault-action-row">
      <div class="fault-selected-label" id="faultSelectedLabel">No pipe selected</div>
      <button class="btn-fault-rpt" id="btnFaultReport" onclick="submitEdgeFault('FAULT')"       disabled>⚠ Report</button>
      <button class="btn-fault-clr" id="btnFaultClear"  onclick="submitEdgeFault('FAULT_CLEAR')" disabled>✓ Clear</button>
    </div>
    <div class="fault-submit-status" id="faultSubmitStatus"></div>
  </div>

  <div class="card">
    <div class="section-header">
      <div class="section-title" style="margin-bottom:0">Today's Toggle Records</div>
    </div>
    <div id="recordsList">
      <div class="empty-state"><div class="e-icon">🗒️</div>No records yet today</div>
    </div>
    <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px">
      <div class="field-label" style="margin-bottom:10px">Download Records by Month</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select id="dlMonth" class="dl-select">
          <option value="01">January</option><option value="02">February</option>
          <option value="03">March</option><option value="04">April</option>
          <option value="05">May</option><option value="06">June</option>
          <option value="07">July</option><option value="08">August</option>
          <option value="09">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
        <select id="dlYear" class="dl-select"></select>
        <button class="btn-download" onclick="downloadRecords()">⬇ Download CSV</button>
      </div>
      <div id="dlStatus" style="font-size:12px;font-weight:600;color:var(--text3);margin-top:8px;min-height:18px"></div>
    </div>
  </div>

  <div style="height:24px"></div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const WORKER      = 'https://scada-visualizer.je1-bd1-raghu.workers.dev';
const GIST_BASE   = 'https://gist.githubusercontent.com/je1bd1raghu/b92c304c7c56c5a76916600d35b55d67/raw';
const RECORDS_FILE = 'records.csv';
const CONFIG_FILE  = 'config.json';
const COOLDOWN_MS  = 5 * 60 * 1000;

// ── STATE ──────────────────────────────────────────────────────────────────────
let persons    = [];
let deviceId   = '';    // FingerprintJS visitor ID, resolved once on boot
let assets     = [];      // [{ id, name, type, state, lat, lng, tolerance }]
let assetMap   = {};      // id → asset
let assetStatus = {};     // id → { status, lastPersonId, lastPersonName, lastChangedAt }
let todayRecs  = [];
let currentPos = null;
let watchId    = null;

// ── BOOT ───────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateClock();
  setInterval(updateClock, 1000);
  setInterval(tickCooldowns, 1000);
  initApp();
});

async function initApp() {
  setProgress(10); setLoadText('Loading configuration…');
  deviceId = await getDeviceId();
  if (!await fetchConfig()) { hideLoading(); return; }

  setProgress(40); setLoadText('Reading zone assets…');
  await loadAssetsFromGist();

  setProgress(70); setLoadText('Loading records…');
  await fetchRecords();

  setProgress(90); setLoadText('Loading pipe network…');
  await loadAllEdges();

  setProgress(100); setLoadText('Ready!');
  populateYears();
  setTimeout(hideLoading, 500);
}

// ── CLOCK ──────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  $('dispDate').textContent   = `${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  $('dispTime').textContent   = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  $('dispDay').textContent    = DAYS[now.getDay()].slice(0, 3);
  $('headerDate').textContent = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
}

// ── WORKER API ─────────────────────────────────────────────────────────────────
async function workerGet(endpoint) {
  const r = await fetch(`${WORKER}/${endpoint}`);
  if (!r.ok) throw new Error(`Worker ${endpoint} failed: HTTP ${r.status}`);
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d.files;  // { filename: rawString }
}

async function workerPatch(fileMap) {
  const files = {};
  for (const [k, v] of Object.entries(fileMap))
    files[k] = { content: typeof v === 'string' ? v : JSON.stringify(v, null, 2) };
  const r = await fetch(`${WORKER}/output`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ files })
  });
  if (!r.ok) throw new Error(`Worker write failed: HTTP ${r.status}`);
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || 'Gist write failed');
}

// ── DEVICE ID ─────────────────────────────────────────────────────────────────
async function getDeviceId() {
  try {
    const fp = await FingerprintJS.load();
    return (await fp.get()).visitorId;
  } catch { return 'unknown'; }
}

// ── CONFIG ─────────────────────────────────────────────────────────────────────
async function fetchConfig() {
  try {
    const files = await workerGet('config');
    persons = JSON.parse(files[CONFIG_FILE] || '{}').persons || [];
    populatePersons();
    return true;
  } catch(e) { showToast('Config error: ' + e.message, 'error'); return false; }
}

// ── ASSETS FROM GIST ──────────────────────────────────────────────────────────
// Two sources, combined:
//   Gist status files → id, label, type, state  (one entry per asset)
//   Zone JSON files   → lat, lng                (repo-hosted, per node)
//
// Uses asset.zone from config.json to fetch only the zone JSON files that are
// actually referenced — avoids fetching every zone on every load.
async function loadAssetsFromGist() {
  try {
    const mRes = await fetch('manifest.json?t=' + Date.now());
    if (!mRes.ok) throw new Error('manifest.json not found');
    const zones    = await mRes.json();
    const zoneMap  = Object.fromEntries(zones.map(z => [z.id, z])); // id → manifest entry

    // Collect only the zone ids actually used by any person's assets in config.
    // Falls back to all zones if config hasn't loaded yet or zone field is absent.
    const usedZoneIds = new Set(
      persons.flatMap(p => (p.assets || []).map(a => a.zone).filter(Boolean))
    );
    const zonesToFetch = usedZoneIds.size > 0
      ? zones.filter(z => usedZoneIds.has(z.id))
      : zones;  // fallback: fetch all (pre-config or legacy data without zone field)

    const seen = new Set();
    const raw  = [];

    // 1. Build asset list from gist status files (label / type / state).
    //    Only fetch status files for zones we actually need.
    for (const zone of zonesToFetch) {
      if (!zone.gistFile) continue;
      try {
        const res = await fetch(`${GIST_BASE}/${zone.gistFile}?t=${Date.now()}`);
        if (!res.ok) continue;
        for (const entry of await res.json()) {
          if (!entry.id || seen.has(entry.id)) continue;
          seen.add(entry.id);
          raw.push({
            id:        entry.id,
            name:      (entry.label || entry.id).replace(/\n/g, ' '),
            type:      entry.type  || '',
            state:     entry.state || 'OFF',
            lat:       null,
            lng:       null,
            tolerance: 50
          });
        }
      } catch { /* skip unreadable gist file */ }
    }

    assets   = raw;
    assetMap = Object.fromEntries(assets.map(a => [a.id, a]));

    // 2. Overlay lat/lng from zone JSON files (zones/zone_a.json etc.).
    //    Build a per-zone asset lookup so each zone file is fetched at most once.
    const assetsByZone = {};  // zoneId → [assetId, ...]
    for (const person of persons) {
      for (const pa of (person.assets || [])) {
        if (!pa.zone || !pa.id) continue;
        (assetsByZone[pa.zone] = assetsByZone[pa.zone] || new Set()).add(pa.id);
      }
    }

    if (Object.keys(assetsByZone).length > 0) {
      // Targeted fetch: only load zone JSON files referenced in config.
      for (const [zoneId, assetIdSet] of Object.entries(assetsByZone)) {
        try {
          const res = await fetch(`zones/${zoneId}.json?t=${Date.now()}`);
          if (!res.ok) continue;
          for (const node of (await res.json()).nodes || []) {
            const d = node.data || {};
            if (!assetIdSet.has(d.id)) continue;   // skip nodes not in this person's list
            const a = assetMap[d.id];
            if (a && typeof d.lat === 'number') { a.lat = d.lat; a.lng = d.lng; }
          }
        } catch { /* skip unreadable zone JSON */ }
      }
    } else {
      // Fallback: no zone field in config — scan all zone JSONs as before.
      for (const zone of zones) {
        if (!zone.id) continue;
        try {
          const res = await fetch(`zones/${zone.id}.json?t=${Date.now()}`);
          if (!res.ok) continue;
          for (const node of (await res.json()).nodes || []) {
            const d = node.data || {};
            const a = assetMap[d.id];
            if (a && typeof d.lat === 'number') { a.lat = d.lat; a.lng = d.lng; }
          }
        } catch { /* skip unreadable zone JSON */ }
      }
    }

    // Seed ON/OFF from gist state; CSV records will override per-asset below
    assets.forEach(a => {
      assetStatus[a.id] = { status: a.state, lastPersonId: null, lastPersonName: null, lastChangedAt: null };
    });

  } catch(e) {
    showToast('Zone load warning: ' + e.message, 'warning');
    assets = []; assetMap = {};
  }
}

// ── RECORDS ────────────────────────────────────────────────────────────────────
async function fetchRecords() {
  try {
    const files   = await workerGet('output');
    const allRecs = csvParse(files[RECORDS_FILE] || '');
    window._allFaultRecs = allRecs;   // used by deriveFaultStateFromRecords
    todayRecs     = allRecs.filter(r => r.date === todayStr());

    // Latest record per asset wins over gist state seed
    allRecs.forEach(r => {
      const cur = assetStatus[r.assetId];
      if (!cur?.lastChangedAt || r.timestamp > cur.lastChangedAt)
        assetStatus[r.assetId] = { status: r.action, lastPersonId: r.personId, lastPersonName: r.personName, lastChangedAt: r.timestamp };
    });

    // Restore cooldowns from server records
    todayRecs.forEach(r => {
      const ts = new Date(r.timestamp).getTime();
      if (ts > getLastToggleRaw(r.personId, r.assetId))
        try { localStorage.setItem(cdKey(r.personId, r.assetId), ts); } catch {}
    });

    renderRecords();
  } catch { todayRecs = []; renderRecords(); }
}

async function refreshAll() {
  showToast('Refreshing…');
  await fetchRecords();
  const person = persons.find(p => p.id === getPersonId());
  if (person && currentPos) renderAssets(person);
  showToast('Refreshed ✓', 'success');
}

// ── PERSONS COMBOBOX ──────────────────────────────────────────────────────────
function populatePersons() {

function esc(s) { return String(s).replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function hi(s, q) {
  if (!q) return esc(s);
  try { return esc(s).replace(new RegExp(q.replace(/[-[\]{}()*+?.,\\^$|#]/g, '\\$&'), 'gi'), m => `<mark>${m}</mark>`); }
  catch { return esc(s); }
}

function renderDropdown(query) {
  const q    = query.trim().toLowerCase();
  const list = q ? persons.filter(p => p.name.toLowerCase().includes(q) || (p.designation||'').toLowerCase().includes(q)) : persons;
  $('comboDropdown').innerHTML = list.length
    ? list.map(p => `<div class="combo-item" data-id="${esc(p.id)}">${hi(p.name, q)}${p.designation ? `<div class="combo-desig">${hi(p.designation, q)}</div>` : ''}</div>`).join('')
    : '<div class="combo-empty">No persons found</div>';
}

function filterPersons() {

  openDropdown(); renderDropdown(q);
}
function openDropdown()  { $('comboDropdown').style.display = 'block';  $('comboWrapper').classList.add('open'); }
function closeDropdown() { $('comboDropdown').style.display = 'none';   $('comboWrapper').classList.remove('open'); }

function selectPerson(id) {
  const p = persons.find(x => x.id === id);
  if (!p) return;
  $('personSearch').value    = p.name + (p.designation ? ' — ' + p.designation : '');

function clearPerson() {

}

$('comboDropdown').addEventListener('mousedown', e => {
  const item = e.target.closest('.combo-item');

function onPersonChange() {
  resetLoc();
  $('assetsCard').style.display = 'none';

  if (id) { ensureWatch(); if (currentPos) onGpsUpdate(); }
}
function getPersonId() { return $('personSelect').value; }

// ── LOCATION ───────────────────────────────────────────────────────────────────
function ensureWatch() {
  if (watchId !== null) return;
  if (!navigator.geolocation) { setLoc('failed', '❌', 'GPS not supported', 'Use Chrome or Safari'); return; }
  setLoc('checking', '📡', 'Getting your location…', 'Please hold still');
  watchId = navigator.geolocation.watchPosition(
    pos => { currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: Math.round(pos.coords.accuracy) }; onGpsUpdate(); },
    err  => { const m = {1:'Permission denied', 2:'Location unavailable', 3:'Timed out'}; setLoc('failed', '❌', m[err.code] || 'Location error', 'Enable GPS and try again'); },
    { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
  );
}
function onGpsUpdate() {
  if (!getPersonId()) return;
  setLoc('verified', '✅', 'Location acquired', `Accuracy: ±${currentPos.acc}m`);
  const person = persons.find(p => p.id === getPersonId());
  if (person) renderAssets(person);
}
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, r = Math.PI / 180;
  const dL = (lat2-lat1)*r, dG = (lng2-lng1)*r;
  const a  = Math.sin(dL/2)**2 + Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dG/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function setLoc(cls, icon, title, sub) {
  $('locStatus').className = 'loc-status ' + cls;
  $('locIcon').textContent  = icon;
  $('locTitle').textContent = title;
  $('locSub').textContent   = sub;
}
function resetLoc() { setLoc('idle', '📍', 'Location not checked', 'Select your name to begin'); }

// ── ASSET RENDER ───────────────────────────────────────────────────────────────
const TYPE_ICON = { pump:'⚙️', valve:'🔧', zone:'🗺️' };

function renderAssets(person) {
  let list = (person.assets?.length)
    ? person.assets.map(e => assetMap[e.id] ? { ...assetMap[e.id], tolerance: e.tolerance ?? 50, zone: e.zone || null } : null).filter(Boolean)
    : assets;

  const el = $('assetsList');
  el.innerHTML = list.length
    ? list.map(a => buildAssetCard(a, person.id)).join('')
    : '<div class="empty-state"><div class="e-icon">🏭</div>No assets assigned to you</div>';
  $('assetsCard').style.display = 'block';
}

function buildAssetCard(asset, personId) {
  const st     = assetStatus[asset.id] || { status: 'OFF' };
  const isOn   = st.status === 'ON';
  const tol    = asset.tolerance || 50;
  const hasGps = asset.lat !== null && asset.lng !== null;
  const dist   = hasGps && currentPos ? Math.round(haversine(currentPos.lat, currentPos.lng, asset.lat, asset.lng)) : null;
  const near   = !hasGps || dist <= tol;
  const cdLeft = getCooldownRemaining(personId, asset.id);

  const locBadge = dist !== null
    ? `<span class="loc-badge ${near ? 'loc-near':'loc-far'}">${near?'✅':'📵'} ${dist}m / ${tol}m</span>`
    : `<span class="loc-badge loc-unk">📍 Unknown</span>`;

  const typeStr = asset.type ? (TYPE_ICON[asset.type] || '🏭') + ' ' + asset.type.charAt(0).toUpperCase() + asset.type.slice(1) : '';
  const lastText = st.lastPersonName ? `By ${esc(st.lastPersonName)} · ${fmtTime(st.lastChangedAt)}` : 'No recent activity';
  const cdBadge  = cdLeft > 0 ? `<span class="cooldown-badge" id="cd-badge-${esc(asset.id)}">⏳ ${formatCooldown(cdLeft)}</span>` : `<span id="cd-badge-${esc(asset.id)}"></span>`;
  const disabled = (!near || cdLeft > 0) ? 'disabled' : '';
  const title    = !near ? `Move within ${tol}m to toggle` : cdLeft > 0 ? `Cooldown: ${formatCooldown(cdLeft)}` : '';

  return `
<div class="asset-card ${isOn?'status-on':'status-off'}" id="asset-card-${esc(asset.id)}">
  <div class="asset-top">
    <div>
      <div class="asset-name">${esc(asset.name)}</div>
      ${typeStr ? `<div class="asset-type">${esc(typeStr)}</div>` : ''}
      <div class="asset-dist">${dist !== null ? `${dist}m away · must be within ${tol}m` : 'Distance unknown'}</div>
    </div>
    <div class="toggle-wrap">
      <button class="toggle-switch ${isOn?'on':'off'}" id="toggle-btn-${esc(asset.id)}"
              onclick="doToggle('${esc(asset.id)}')" ${disabled} title="${title}">
        <div class="toggle-knob"></div>
      </button>
      <span class="toggle-lbl" id="toggle-lbl-${esc(asset.id)}">${isOn?'ON':'OFF'}</span>
    </div>
  </div>
  <div class="asset-footer">
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${locBadge}<span class="asset-last">🕐 ${lastText}</span></div>
    ${cdBadge}
  </div>
</div>`;
}

function tickCooldowns() {
  const pid = getPersonId();
  if (!pid) return;
  assets.forEach(asset => {
    const badge = document.getElementById('cd-badge-' + asset.id);
    const btn   = document.getElementById('toggle-btn-' + asset.id);
    if (!badge || !btn) return;
    const cdLeft = getCooldownRemaining(pid, asset.id);
    const dist   = asset.lat !== null && asset.lng !== null && currentPos
                   ? Math.round(haversine(currentPos.lat, currentPos.lng, asset.lat, asset.lng)) : null;
    const near   = (asset.lat === null) || dist <= (asset.tolerance || 50);
    badge.className   = cdLeft > 0 ? 'cooldown-badge' : '';
    badge.textContent = cdLeft > 0 ? '⏳ ' + formatCooldown(cdLeft) : '';
    btn.disabled      = !near || cdLeft > 0;
  });
}

// ── TOGGLE ─────────────────────────────────────────────────────────────────────
async function doToggle(assetId) {
  const person = persons.find(p => p.id === getPersonId());
  const asset  = assetMap[assetId];
  if (!person || !asset || !currentPos) { showToast('Location not available yet', 'error'); return; }

  const hasGps = asset.lat !== null && asset.lng !== null;
  const dist   = hasGps ? Math.round(haversine(currentPos.lat, currentPos.lng, asset.lat, asset.lng)) : null;
  const tol    = asset.tolerance || 50;
  if (hasGps && dist > tol) { showToast(`Too far away (${dist}m). Must be within ${tol}m`, 'error'); return; }

  const cdLeft = getCooldownRemaining(person.id, assetId);
  if (cdLeft > 0) { showToast('Wait ' + formatCooldown(cdLeft) + ' before toggling again', 'warning'); return; }

  const card = document.getElementById('asset-card-' + assetId);
  if (card) card.classList.add('loading');

  try {
    const now       = new Date();
    const newStatus = (assetStatus[assetId]?.status || 'OFF') === 'ON' ? 'OFF' : 'ON';

    assetStatus[assetId] = { status: newStatus, lastPersonId: person.id, lastPersonName: person.name, lastChangedAt: now.toISOString() };

    const allExisting = csvParse((await workerGet('output'))[RECORDS_FILE] || '');
    const rec = {
      sn:       allExisting.length + 1,
      deviceId: deviceId,
      personId: person.id, personName: person.name,
      assetId:  asset.id,  assetName:  asset.name,
      action: newStatus,   timestamp:  now.toISOString(),
      date: todayStr(),    time:       timeStr(now),
      lat: currentPos.lat.toFixed(7), lng: currentPos.lng.toFixed(7),
      distance: dist ?? ''
    };

    allExisting.push(rec);
    await workerPatch({ [RECORDS_FILE]: csvStringify(allExisting) });

    setLastToggle(person.id, assetId);
    todayRecs.push(rec);
    renderRecords();
    if (card) card.outerHTML = buildAssetCard(asset, person.id);
    showToast(`${esc(asset.name)} → ${newStatus}`, newStatus === 'ON' ? 'success' : 'error');
  } catch(e) {
    if (card) card.classList.remove('loading');
    showToast('Save error: ' + e.message, 'error');
  }
}

// ── COOLDOWN ───────────────────────────────────────────────────────────────────
function cdKey(pid, aid)            { return `sac_cd_${pid}_${aid}`; }
function getLastToggleRaw(pid, aid) { try { return parseInt(localStorage.getItem(cdKey(pid, aid))) || 0; } catch { return 0; } }
function setLastToggle(pid, aid)    { try { localStorage.setItem(cdKey(pid, aid), Date.now()); } catch {} }
function getCooldownRemaining(pid, aid) { return Math.max(0, COOLDOWN_MS - (Date.now() - getLastToggleRaw(pid, aid))); }
function formatCooldown(ms) { const s = Math.ceil(ms/1000), m = Math.floor(s/60); return m > 0 ? `${m}m ${s%60}s` : `${s}s`; }
function fmtTime(iso) { try { return new Date(iso).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); } catch { return '—'; } }

// ── RECORDS RENDER ─────────────────────────────────────────────────────────────
function renderRecords() {
  const el = $('recordsList');
  if (!todayRecs.length) { el.innerHTML = '<div class="empty-state"><div class="e-icon">🗒️</div>No records yet today</div>'; return; }
  el.innerHTML = [...todayRecs].sort((a,b) => b.timestamp.localeCompare(a.timestamp)).map(r => {
    const isOn      = r.action === 'ON';
    const isFault   = r.action === 'FAULT';
    const isClear   = r.action === 'FAULT_CLEAR';
    const avatarCls = isFault ? 'rec-fault' : isClear ? 'rec-fault-clear' : isOn ? 'rec-on' : 'rec-off';
    const avatarIcon= isFault ? '⚠' : isClear ? '✓' : isOn ? '▲' : '▼';
    const chipCls   = isFault ? 'chip-fault' : isClear ? 'chip-fault-clear' : isOn ? 'chip-on' : 'chip-off';
    const chipLabel = isFault ? '⚠ FAULT' : isClear ? '✓ CLEARED' : isOn ? '▲ ON' : '▼ OFF';
    const assetIcon = (isFault || isClear) ? '🔗' : '🏭';
    return `<div class="record-item">
  <div class="record-avatar ${avatarCls}">${avatarIcon}</div>
  <div class="record-info">
    <div class="record-name">${esc(r.personName||'—')}</div>
    <div class="record-asset">${assetIcon} ${esc(r.assetName||'—')}</div>
    <div class="record-meta">📍 ${r.distance ? r.distance+'m away' : (r.zone ? 'Zone: '+r.zone : '—')}</div>
  </div>
  <div class="record-right">
    <span class="time-chip ${chipCls}">${chipLabel} ${r.time||'—'}</span>
  </div>
</div>`;
  }).join('');
}

// ── FAULT EDGE REPORT ──────────────────────────────────────────────────────────
let allEdges       = [];    // [{ id, source, target, zone, zoneName }]
let faultEdgeState = {};    // edgeId → 'FAULT' | 'FAULT_CLEAR'
let selectedEdgeId = null;
let activeFaultZone = null; // null = all zones

async function loadAllEdges() {
  try {
    const mRes = await fetch('manifest.json?t=' + Date.now());
    const zones = await mRes.json();
    allEdges = [];
    for (const zone of zones) {
      try {
        const res = await fetch(`zones/${zone.id}.json?t=${Date.now()}`);
        if (!res.ok) continue;
        const data = await res.json();
        for (const e of (data.edges || [])) {
          const d = e.data || e;
          allEdges.push({ id: d.id, source: d.source || '', target: d.target || '', zone: zone.id, zoneName: zone.name || zone.id });
        }
      } catch { /* skip */ }
    }
    buildFaultZoneTabs(zones);
    deriveFaultStateFromRecords();
    renderFaultEdgeList();
  } catch(e) {
    $('faultEdgeList').innerHTML = `<div class="fault-empty">Could not load edges: ${esc(e.message)}</div>`;
  }
}

function deriveFaultStateFromRecords() {
  faultEdgeState = {};
  // todayRecs may not have all records — use the full allRecs if available, else fallback to todayRecs
  const recs = (window._allFaultRecs || todayRecs);
  recs.forEach(r => {
    if ((r.action === 'FAULT' || r.action === 'FAULT_CLEAR') && r.assetId)
      faultEdgeState[r.assetId] = r.action;
  });
}

function buildFaultZoneTabs(zones) {
  const wrap = $('faultZoneTabs');
  const all = `<button class="btn-refresh" id="fztab-all" onclick="setFaultZone(null)" style="background:var(--primary);color:#fff;border-color:var(--primary)">All Zones</button>`;
  const tabs = zones.map(z =>
    `<button class="btn-refresh" id="fztab-${esc(z.id)}" onclick="setFaultZone('${esc(z.id)}')">${esc(z.name || z.id)}</button>`
  ).join('');
  wrap.innerHTML = all + tabs;
}

function setFaultZone(zoneId) {
  activeFaultZone = zoneId;
  // Update tab highlight
  $('faultZoneTabs').querySelectorAll('button').forEach(btn => {
    const isActive = (zoneId === null && btn.id === 'fztab-all') || btn.id === `fztab-${zoneId}`;
    btn.style.background    = isActive ? 'var(--primary)' : '';
    btn.style.color         = isActive ? '#fff' : '';
    btn.style.borderColor   = isActive ? 'var(--primary)' : '';
  });
  renderFaultEdgeList();
}

function filterFaultEdges() { renderFaultEdgeList(); }

function renderFaultEdgeList() {
  const q    = ($('faultSearch').value || '').trim().toLowerCase();
  const list = allEdges.filter(e => {
    if (activeFaultZone && e.zone !== activeFaultZone) return false;
    if (!q) return true;
    return e.id.toLowerCase().includes(q)
        || e.source.toLowerCase().includes(q)
        || e.target.toLowerCase().includes(q);
  });

  if (!list.length) {
    $('faultEdgeList').innerHTML = '<div class="fault-empty">No pipes match</div>';
    return;
  }

  $('faultEdgeList').innerHTML = list.map(e => {
    const isFaulted = faultEdgeState[e.id] === 'FAULT';
    const isSelected = e.id === selectedEdgeId;
    return `<div class="fault-edge-item${isSelected ? ' selected' : ''}" onclick="selectFaultEdge('${esc(e.id)}')">
      <div style="flex:1;min-width:0">
        <div class="fei-id">${hi(e.id, q)}</div>
        <div class="fei-route">${hi(e.source, q)} → ${hi(e.target, q)}</div>
      </div>
      <span class="fei-zone">${esc(e.zone)}</span>
      ${isFaulted ? '<span class="fei-fault-badge">⚠ FAULT</span>' : ''}
    </div>`;
  }).join('');
}

function selectFaultEdge(edgeId) {
  selectedEdgeId = edgeId;
  const edge = allEdges.find(e => e.id === edgeId);
  const isFaulted = faultEdgeState[edgeId] === 'FAULT';

  const lbl = $('faultSelectedLabel');
  lbl.textContent = edge ? `${edge.id}  (${edge.source} → ${edge.target})` : edgeId;
  lbl.className   = 'fault-selected-label' + (isFaulted ? ' has-fault' : '');

  $('btnFaultReport').disabled = false;
  $('btnFaultClear').disabled  = false;
  $('btnFaultReport').textContent = isFaulted ? '⚠ Re-report' : '⚠ Report';
  $('btnFaultClear').style.display = isFaulted ? '' : 'none';
  $('faultSubmitStatus').textContent = '';
  renderFaultEdgeList();   // re-render to show selection highlight
}

async function submitEdgeFault(action) {
  const pid    = getPersonId();
  const person = persons.find(p => p.id === pid);
  if (!person) { setFaultSubmitStatus('Select your name above first', 'var(--warning)'); return; }
  if (!selectedEdgeId)  { setFaultSubmitStatus('Select a pipe first', 'var(--warning)'); return; }
  if (!currentPos) { setFaultSubmitStatus('⏳ Waiting for GPS location…', 'var(--warning)'); return; }

  const edge = allEdges.find(e => e.id === selectedEdgeId);

  $('btnFaultReport').disabled = true;
  $('btnFaultClear').disabled  = true;
  setFaultSubmitStatus('Saving…', 'var(--text3)');

  try {
    const now      = new Date();
    const existing = csvParse((await workerGet('output'))[RECORDS_FILE] || '');
    const rec = {
      sn:         existing.length + 1,
      deviceId:   deviceId,
      personId:   person.id,
      personName: person.name,
      assetId:    selectedEdgeId,
      assetName:  edge ? `${edge.source} → ${edge.target}` : selectedEdgeId,
      action:     action,
      timestamp:  now.toISOString(),
      date:       todayStr(),
      time:       timeStr(now),
      lat:        currentPos.lat.toFixed(7),
      lng:        currentPos.lng.toFixed(7),
      distance:   '',
      zone:       edge?.zone || ''
    };
    existing.push(rec);
    await workerPatch({ [RECORDS_FILE]: csvStringify(existing) });

    faultEdgeState[selectedEdgeId] = action;
    todayRecs.push(rec);
    renderRecords();
    renderFaultEdgeList();
    selectFaultEdge(selectedEdgeId);   // refresh label/buttons

    const msg = action === 'FAULT' ? '⚠ Fault reported' : '✓ Fault cleared';
    setFaultSubmitStatus(msg, action === 'FAULT' ? 'var(--danger)' : 'var(--success)');
    showToast(msg, action === 'FAULT' ? 'error' : 'success');
  } catch(e) {
    setFaultSubmitStatus('Error: ' + e.message, 'var(--danger)');
  } finally {
    $('btnFaultReport').disabled = false;
    $('btnFaultClear').disabled  = false;
  }
}

function setFaultSubmitStatus(msg, color) {
  const el = $('faultSubmitStatus');
  el.textContent   = msg;
  el.style.color   = color || 'var(--text3)';
}

// ── CSV ────────────────────────────────────────────────────────────────────────
const CSV_COLS = ['sn','personId','personName','zone','assetId','assetName','action','timestamp','date','time','lat','lng','distance','deviceId'];
function csvParse(text) {
  if (!text?.trim()) return [];
  return Papa.parse(text.trim(), { header: true, skipEmptyLines: true }).data;
}
function csvStringify(recs) {
  return Papa.unparse(recs, { columns: CSV_COLS });
}

// ── CSV DOWNLOAD ───────────────────────────────────────────────────────────────
function populateYears() {
  const sel = $('dlYear');
  const now = new Date();
  sel.innerHTML = '';
  for (let y = now.getFullYear(); y >= 2024; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    sel.appendChild(o);
  }
  // Default month selector to current month
  $('dlMonth').value = pad(now.getMonth() + 1);
}

async function downloadRecords() {
  const month = $('dlMonth').value;
  const year  = $('dlYear').value;
  const btn   = document.querySelector('.btn-download');
  const status = $('dlStatus');

  btn.disabled = true;
  status.style.color = 'var(--text3)';
  status.textContent = 'Fetching records…';

  try {
    const files   = await workerGet('output');
    const allRecs = csvParse(files[RECORDS_FILE] || '');
    const prefix  = `${year}-${month}`;
    const filtered = allRecs.filter(r => (r.date || '').startsWith(prefix));

    if (!filtered.length) {
      status.style.color = 'var(--warning)';
      status.textContent = `No records found for ${$('dlMonth').options[$('dlMonth').selectedIndex].text} ${year}.`;
      return;
    }

    const csv      = Papa.unparse(filtered, { columns: CSV_COLS });
    const blob     = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url      = URL.createObjectURL(blob);
    const a        = document.createElement('a');
    a.href         = url;
    a.download     = `records_${year}_${month}.csv`;
    a.click();
    URL.revokeObjectURL(url);

    status.style.color = 'var(--success)';
    status.textContent = `✓ Downloaded ${filtered.length} record${filtered.length > 1 ? 's' : ''} for ${$('dlMonth').options[$('dlMonth').selectedIndex].text} ${year}.`;
  } catch(e) {
    status.style.color = 'var(--danger)';
    status.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

// ── UTILITIES ──────────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function todayStr() { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function timeStr(d) { return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
function setProgress(p) { $('loadingBar').style.width = p+'%'; }
function setLoadText(t) { $('loadingText').textContent = t; }
function hideLoading()  { const el=$('loadingScreen'); el.classList.add('hide'); setTimeout(()=>el.style.display='none', 450); }

let toastTmr;
function showToast(msg, type='') {
  const el = $('toast');
  el.textContent = msg; el.className = 'toast '+type;
  void el.offsetWidth; el.classList.add('show');
  clearTimeout(toastTmr); toastTmr = setTimeout(() => el.classList.remove('show'), 3400);
}
</script>
